<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Snack in Save - Order</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f0f0;
            overflow: hidden;
        }
        /* Toolbar */
        .toolbar {
            background: #d35400;
            color: white;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            height: 48px;
        }
        .toolbar h3 {
            font-size: 18px;
            margin: 0;
        }
        .settings-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 0 8px;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 48px);
            border: none;
            margin-top: 48px;
        }
        /* Settings Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 20;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .modal-content h3 {
            margin-bottom: 15px;
            color: #d35400;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        .modal-content button {
            background: #d35400;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        .status {
            font-size: 13px;
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h3>🍔 Snack in Save 9Nueve</h3>
        <button class="settings-btn" id="openSettingsBtn">⚙️</button>
    </div>

    <iframe id="orderFrame" src="about:blank"></iframe>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>Server Settings</h3>
            <p>Ilagay ang buong URL ng iyong order page</p>
            <input type="text" id="pageUrl" placeholder="http://10.0.0.1/app/index.php">
            <div>
                <button id="saveUrlBtn">I-save</button>
                <button id="closeModalBtn">Kanselahin</button>
            </div>
            <div class="status" id="statusMsg"></div>
        </div>
    </div>

    <script>
        // Key para sa localStorage
        const STORAGE_KEY = 'order_page_url';

        // Default URL (gumamit ng localhost para sa sariling laptop, o kahit anong default)
        const DEFAULT_URL = 'http://localhost/app/index.php';

        // Kunin ang naka‑save na URL, kung wala ay DEFAULT_URL
        let currentUrl = localStorage.getItem(STORAGE_KEY) || DEFAULT_URL;

        const iframe = document.getElementById('orderFrame');
        const modal = document.getElementById('settingsModal');
        const urlInput = document.getElementById('pageUrl');
        const statusMsg = document.getElementById('statusMsg');

        // I‑load ang iframe gamit ang kasalukuyang URL
        function loadOrderPage() {
            if (!currentUrl) {
                openModal();
                statusMsg.innerText = 'Walang naka‑set na URL. Ilagay ang address ng order page.';
                iframe.src = 'about:blank';
                return;
            }
            console.log('Loading order page:', currentUrl);
            iframe.src = currentUrl;
        }

        // I‑save ang bagong URL
        function saveUrl() {
            let newUrl = urlInput.value.trim();
            if (newUrl === '') {
                statusMsg.innerText = 'Pakilagay ang wastong URL (hal. http://10.0.0.1/app/index.php)';
                return;
            }
            // Simpleng validation kung nagsisimula sa http:// o https://
            if (!newUrl.startsWith('http://') && !newUrl.startsWith('https://')) {
                statusMsg.innerText = 'Ang URL ay dapat magsimula sa http:// o https://';
                return;
            }
            currentUrl = newUrl;
            localStorage.setItem(STORAGE_KEY, currentUrl);
            statusMsg.innerText = 'Na‑save na! Ire‑refresh ang app...';
            modal.style.display = 'none';
            loadOrderPage();
        }

        // Bukas ng modal (pre‑fill ang kasalukuyang URL)
        function openModal() {
            urlInput.value = currentUrl;
            statusMsg.innerText = '';
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            if (!currentUrl) {
                alert('Walang naka‑set na URL. Pindutin ang gear icon para mag‑set.');
            }
        }

        // Event listeners
        document.getElementById('openSettingsBtn').addEventListener('click', openModal);
        document.getElementById('saveUrlBtn').addEventListener('click', saveUrl);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);

        // Enter key sa input
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveUrl();
        });

        // Simulan ang app
        loadOrderPage();
    </script>
</body>
</html>
